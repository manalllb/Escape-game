nelmio_cors:
  defaults:
    allow_origin: ['http://localhost:4200', 'http://localhost:5173']
    allow_headers: ['Content-Type', 'Authorization', 'Accept', 'X-Api-Token']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    expose_headers: ['X-Api-Token']
    max_age: 3600
  paths:
    '^/api/':
      allow_origin: ['http://localhost:4200', 'http://localhost:5173']