<!-- Structure principale de l'application -->
<div class="page-shell">

  <!-- Section: En-tête (topbar) avec logo et bouton de navigation -->
  <header class="topbar">
    <!-- Section: Identité de la marque (logo + titre) -->
    <div class="brand">
      <div class="brand-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="9" x2="15" y2="9"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
      </div>
      <h1 class="brand-title">Mission We Lab</h1>
    </div>

    <!-- Section: Bouton de navigation (Retour ou Déconnexion) -->
    <button
      *ngIf="currentUrl !== '/'"
      class="back-btn"
      (click)="handleHeaderAction()">
      {{ headerBtnLabel }}
    </button>
  </header>

  <!-- Section: Contenu principal de la page active -->
  <main>
    <!-- RouterOutlet: Point d'insertion du composant de la route active -->
    <router-outlet></router-outlet>
  </main>
</div>
