
<div class="welcome-wrap">

  <div class="welcome-header">

    <h1 class="welcome-title">Mission We Lab</h1>

    <p class="welcome-subtitle">
      Entre en session, résous les trois épreuves et retrouve la formule finale.
    </p>
  </div>

  <div class="cards-row">

    <div class="role-card">

      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>

      <h2 class="role-title">Joueur</h2>
      <p class="role-desc">Entre le code PIN donné par l’animateur.</p>

      <button class="role-btn" (click)="goPlayer()">Rejoindre une session</button>
    </div>

    <div class="role-card">

      <div class="role-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
          <path d="M17.5 8.5l1.5-1.5 1.5 1.5"></path>
          <path d="M19 7l1.5 1.5"></path>
          <path d="M19 7l-1.5 1.5"></path>
          <circle cx="19" cy="7" r="3" stroke-width="1.5"></circle>
        </svg>
      </div>

      <h2 class="role-title">Administrateur</h2>
      <p class="role-desc">Créer une session et suivre la progression.</p>

      <button class="role-btn" (click)="goAdmin()">Ouvrir le panneau admin</button>
    </div>
  </div>
</div>
